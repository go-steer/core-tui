# Hugo configuration for the core-tui documentation site.
#
# Theme is Docsy (github.com/google/docsy) pulled in as a Hugo module
# via go.mod. The companion dependencies module supplies Bootstrap +
# FontAwesome + KaTeX so we don't need an npm install step at build
# time.
#
#   cd docs/site
#   hugo server   # local preview at http://localhost:1313/core-tui/
#   hugo          # production build into ./public
#
# Deployed to https://go-steer.github.io/core-tui/ via
# .github/workflows/docs.yml.

baseURL: "https://go-steer.github.io/core-tui/"
title: "core-tui"
languageCode: "en-us"

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true

# Docsy theme module. Docsy itself pulls Bootstrap + FontAwesome as
# Hugo modules transitively via its own go.mod — no separate
# `dependencies` module to import.
module:
  proxy: direct
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/google/docsy

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: github-dark

# Top navbar links beyond the content-driven ones. The Documentation
# entry comes from docs/_index.md's frontmatter `menu.main` directive
# (Docsy's preferred pattern for content pages). External links go
# here.
menu:
  main:
    - name: GitHub
      url: https://github.com/go-steer/core-tui
      weight: 50
    - name: Releases
      url: https://github.com/go-steer/core-tui/releases
      weight: 60

params:
  copyright:
    authors: "core-tui contributors"
    from_year: 2026

  # Default-on UI elements. Sidebar is on; breadcrumb is on
  # (Docsy's default behavior — listed explicitly here for clarity).
  ui:
    breadcrumb_disable: false
    sidebar_menu_compact: false
    sidebar_menu_foldable: true
    sidebar_search_disable: false
    navbar_logo: false
    navbar_translucent_over_cover_disable: true
    footer_about_disable: false
    # Three-state toggle in the navbar: light / dark / auto. The
    # "auto" state follows the user's OS preference via
    # window.matchMedia('(prefers-color-scheme: dark)'); explicit
    # picks persist in localStorage. Implementation lives in
    # Docsy's assets/js/dark-mode.js.
    showLightDarkModeMenu: true
    feedback:
      enable: false

  # GitHub edit links per page ("Edit this page" at the top right).
  github_repo: "https://github.com/go-steer/core-tui"
  github_branch: "main"
  github_subdir: "docs/site"

  # Right-side "On this page" TOC built from H2/H3 headings.
  toc:
    enabled: true

  # Built-in search via offline Lunr index (no external service).
  offlineSearch: true

  links:
    user:
      - name: "GitHub Discussions"
        url: "https://github.com/go-steer/core-tui/discussions"
        icon: "fa-brands fa-github"
        desc: "Ask questions, share what you're building."
    developer:
      - name: "GitHub"
        url: "https://github.com/go-steer/core-tui"
        icon: "fa-brands fa-github"
        desc: "Source code, issue tracker, releases."

  taxonomy:
    taxonomyCloud: []
    taxonomyPageHeader: []
